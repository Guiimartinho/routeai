name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go API
        working-directory: packages/api
        run: |
          mkdir -p ../../app/resources
          go build -ldflags="-s -w" -o ../../app/resources/routeai-api.exe .
        env:
          GOOS: windows
          GOARCH: amd64

      - name: Install dependencies
        working-directory: app
        run: |
          npm install
          npm install @rollup/rollup-win32-x64-msvc --save-optional

      - name: Build frontend
        working-directory: app
        run: npx vite build

      - name: Build Windows installer
        working-directory: app
        run: npx electron-builder --win --config electron/build-config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            app/release/*.exe
            app/release/*.exe.blockmap

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Go API
        working-directory: packages/api
        run: |
          mkdir -p ../../app/resources
          go build -ldflags="-s -w" -o ../../app/resources/routeai-api .
        env:
          GOOS: linux
          GOARCH: amd64

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Build frontend
        working-directory: app
        run: npx vite build

      - name: Build Linux packages
        working-directory: app
        run: npx electron-builder --linux --config electron/build-config.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            app/release/*.AppImage
            app/release/*.deb

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    if: always() && (needs.build-windows.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/
        continue-on-error: true

      - name: Download Linux artifacts
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts/
        continue-on-error: true

      - name: List artifacts
        run: ls -lhR artifacts/ 2>/dev/null || echo "No artifacts"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
