name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            packages/core/.venv
            packages/parsers/.venv
            packages/intelligence/.venv
            packages/solver/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies (core)
        working-directory: packages/core
        run: poetry install --no-interaction

      - name: Install dependencies (parsers)
        working-directory: packages/parsers
        run: poetry install --no-interaction

      - name: Install dependencies (intelligence)
        working-directory: packages/intelligence
        run: poetry install --no-interaction

      - name: Install dependencies (solver)
        working-directory: packages/solver
        run: poetry install --no-interaction

      - name: Run ruff check
        run: |
          for pkg in core parsers intelligence solver; do
            echo "=== Checking packages/$pkg ==="
            cd packages/$pkg
            poetry run ruff check .
            cd ../..
          done

      - name: Run mypy
        run: |
          for pkg in core parsers intelligence solver; do
            echo "=== Type checking packages/$pkg ==="
            cd packages/$pkg
            poetry run mypy .
            cd ../..
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: routeai
          POSTGRES_PASSWORD: routeai_dev
          POSTGRES_DB: routeai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U routeai -d routeai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            packages/core/.venv
            packages/parsers/.venv
            packages/intelligence/.venv
            packages/solver/.venv
          key: poetry-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            poetry-${{ runner.os }}-

      - name: Install dependencies (core)
        working-directory: packages/core
        run: poetry install --no-interaction

      - name: Install dependencies (parsers)
        working-directory: packages/parsers
        run: poetry install --no-interaction

      - name: Install dependencies (intelligence)
        working-directory: packages/intelligence
        run: poetry install --no-interaction

      - name: Install dependencies (solver)
        working-directory: packages/solver
        run: poetry install --no-interaction

      - name: Run tests with coverage (core)
        working-directory: packages/core
        run: poetry run pytest -v --cov=. --cov-report=xml:../../coverage-core.xml --tb=short

      - name: Run tests with coverage (parsers)
        working-directory: packages/parsers
        run: poetry run pytest -v --cov=. --cov-report=xml:../../coverage-parsers.xml --tb=short

      - name: Run tests with coverage (intelligence)
        working-directory: packages/intelligence
        run: poetry run pytest -v --cov=. --cov-report=xml:../../coverage-intelligence.xml --tb=short

      - name: Run tests with coverage (solver)
        working-directory: packages/solver
        run: poetry run pytest -v --cov=. --cov-report=xml:../../coverage-solver.xml --tb=short

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-*.xml
          retention-days: 30
