name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: pip install ruff

      - name: Run ruff check
        run: ruff check packages/core/src packages/parsers/src packages/intelligence/src packages/solver/src --config ruff.toml
        continue-on-error: true

      - name: Run ruff format check
        run: ruff format --check packages/core/src packages/parsers/src packages/intelligence/src packages/solver/src --config ruff.toml
        continue-on-error: true

  test-core:
    name: Test Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: packages/core
        run: |
          pip install poetry
          poetry install --no-interaction

      - name: Run tests
        working-directory: packages/core
        run: poetry run pytest -v --tb=short

  test-parsers:
    name: Test Parsers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          cd packages/core && poetry install --no-interaction && cd ../..
          cd packages/parsers && poetry install --no-interaction && cd ../..

      - name: Run tests
        working-directory: packages/parsers
        run: poetry run pytest -v --tb=short

  test-solver:
    name: Test Solver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          cd packages/core && poetry install --no-interaction && cd ../..
          cd packages/solver && poetry install --no-interaction && cd ../..

      - name: Run tests
        working-directory: packages/solver
        run: poetry run pytest -v --tb=short

  test-intelligence:
    name: Test Intelligence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          cd packages/core && poetry install --no-interaction && cd ../..
          cd packages/solver && poetry install --no-interaction && cd ../..
          cd packages/intelligence && poetry install --no-interaction && cd ../..

      - name: Run tests
        working-directory: packages/intelligence
        run: poetry run pytest -v --tb=short

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install poetry
          cd packages/core && poetry install --no-interaction && cd ../..
          cd packages/solver && poetry install --no-interaction && cd ../..
          cd packages/intelligence && poetry install --no-interaction && cd ../..

      - name: Install test dependencies
        run: pip install pytest

      - name: Run integration tests
        run: |
          PYTHONPATH="packages/core/src:packages/intelligence/src:packages/solver/src" \
          python -m pytest tests/integration/test_gpu_architecture.py -v --tb=short

  build-go:
    name: Build Go API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        working-directory: packages/api
        run: go build -o routeai-api .

      - name: Vet
        working-directory: packages/api
        run: go vet ./...

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: app
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: TypeScript check
        working-directory: app
        run: npx tsc --noEmit 2>&1 || true

      - name: Build
        working-directory: app
        run: npx vite build 2>&1 || true
