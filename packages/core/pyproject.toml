[tool.poetry]
name = "routeai-core"
version = "0.1.0"
description = "RouteAI Core - Unified PCB Data Model for LLM-powered EDA"
authors = ["RouteAI Team"]
license = "MIT"
readme = "README.md"
packages = [{include = "routeai_core", from = "src"}]

[tool.poetry.dependencies]
python = "^3.10"
pydantic = ">=2.0,<3.0"
shapely = ">=2.0,<3.0"
numpy = ">=1.24,<3.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0"
pytest-cov = ">=4.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"
markers = [
    "slow: marks tests as slow",
]

[tool.ruff]
extend = "../../ruff.toml"

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]

[tool.coverage.run]
source = ["routeai_core"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 80
show_missing = true
