apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: routeai
  labels:
    app.kubernetes.io/name: router
    app.kubernetes.io/component: routing-engine
    app.kubernetes.io/part-of: routeai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: router
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: router
        app.kubernetes.io/component: routing-engine
        app.kubernetes.io/part-of: routeai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: router
          image: routeai/router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: health
              containerPort: 50052
              protocol: TCP
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/1"
            - name: LOG_LEVEL
              value: "info"
            - name: THREAD_POOL_SIZE
              value: "8"
          resources:
            # CPU-intensive workload - generous resource allocation
            requests:
              cpu: "1"
              memory: 1Gi
            limits:
              cpu: "4"
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      # Prefer scheduling on nodes with high CPU
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - c5.2xlarge
                      - c5.4xlarge
                      - c6i.2xlarge
                      - c6i.4xlarge
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: router
---
apiVersion: v1
kind: Service
metadata:
  name: router
  namespace: routeai
  labels:
    app.kubernetes.io/name: router
    app.kubernetes.io/part-of: routeai
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/name: router
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: router
  namespace: routeai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: router
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
