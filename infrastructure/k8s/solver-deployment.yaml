apiVersion: apps/v1
kind: Deployment
metadata:
  name: solver
  namespace: routeai
  labels:
    app.kubernetes.io/name: solver
    app.kubernetes.io/component: solver
    app.kubernetes.io/part-of: routeai
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: solver
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: solver
        app.kubernetes.io/component: solver
        app.kubernetes.io/part-of: routeai
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: solver
          image: routeai/solver:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: routeai-config
            - secretRef:
                name: routeai-secrets
          env:
            - name: UVICORN_WORKERS
              value: "2"
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: solver
  namespace: routeai
  labels:
    app.kubernetes.io/name: solver
    app.kubernetes.io/part-of: routeai
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8001
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: solver
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: solver
  namespace: routeai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: solver
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
