apiVersion: v1
kind: Secret
metadata:
  name: routeai-secrets
  namespace: routeai
  labels:
    app.kubernetes.io/part-of: routeai
type: Opaque
stringData:
  # Database credentials - REPLACE IN PRODUCTION
  POSTGRES_USER: "routeai"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

  # MinIO credentials - REPLACE IN PRODUCTION
  MINIO_ACCESS_KEY: "routeai"
  MINIO_SECRET_KEY: "CHANGE_ME_IN_PRODUCTION"

  # JWT secret - REPLACE IN PRODUCTION
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION"

  # LLM API keys - REPLACE IN PRODUCTION
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
