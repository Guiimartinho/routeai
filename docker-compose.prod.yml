version: "3.9"

# =============================================================================
# RouteAI Production Docker Compose
# =============================================================================

x-common-env: &common-env
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: routeai
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routeai_prod}
  POSTGRES_DB: routeai
  REDIS_URL: redis://redis:6379/0
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-routeai}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-routeai_prod}
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    image: routeai/api:${TAG:-latest}
    container_name: routeai-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      <<: *common-env
      GIN_MODE: release
      INTELLIGENCE_URL: http://intelligence:8000
      SOLVER_URL: http://solver:8001
      ROUTER_GRPC_ADDR: router:50051
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://routeai.example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/routeai-api", "--health-check"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  intelligence:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.intelligence
    image: routeai/intelligence:${TAG:-latest}
    container_name: routeai-intelligence
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-4-20250514}
      SOLVER_URL: http://solver:8001
      ROUTER_GRPC_ADDR: router:50051
      UVICORN_WORKERS: "4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  solver:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.solver
    image: routeai/solver:${TAG:-latest}
    container_name: routeai-solver
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      <<: *common-env
      ROUTER_GRPC_ADDR: router:50051
      UVICORN_WORKERS: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  router:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.router
    image: routeai/router:${TAG:-latest}
    container_name: routeai-router
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      REDIS_URL: redis://redis:6379/1
      LOG_LEVEL: ${LOG_LEVEL:-info}
      THREAD_POOL_SIZE: "8"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:50052/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    image: routeai/web:${TAG:-latest}
    container_name: routeai-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Infrastructure Services
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    container_name: routeai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: routeai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-routeai_prod}
      POSTGRES_DB: routeai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routeai -d routeai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    command: >
      postgres
        -c shared_preload_libraries=vector
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=1000
    networks:
      - routeai-net

  redis:
    image: redis:7-alpine
    container_name: routeai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    command: >
      redis-server
        --appendonly yes
        --maxmemory 384mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
        --tcp-backlog 511
    networks:
      - routeai-net

  minio:
    image: minio/minio:latest
    container_name: routeai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-routeai}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-routeai_prod}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    command: server /data --console-address ":9001"
    networks:
      - routeai-net

  # ---------------------------------------------------------------------------
  # Monitoring Services
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: routeai-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alerting-rules.yml:/etc/prometheus/alerting-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: routeai-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-routeai_admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - routeai-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  routeai-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
