# RouteAI - Ruff Configuration
# https://docs.astral.sh/ruff/configuration/

target-version = "py310"
line-length = 100

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function call in argument defaults (FastAPI Depends)
    "B905",   # zip without strict= (Python 3.10 compat)
    "UP007",  # use X | Y for union types (keep Optional for readability)
    "SIM108", # use ternary operator (readability preference)
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "B011",  # assert False
    "B017",  # pytest.raises without match
    "SIM300", # yoda conditions in assertions
]
"__init__.py" = [
    "F401",  # unused imports (re-exports)
]

[lint.isort]
known-first-party = [
    "routeai_core",
    "routeai_parsers",
    "routeai_intelligence",
    "routeai_solver",
    "routeai_cli",
]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

exclude = [
    "__pycache__",
    ".venv",
    "venv",
    "node_modules",
    "dist",
    "build",
    ".pytest_cache",
    ".mypy_cache",
    ".ruff_cache",
    "*.egg-info",
]
